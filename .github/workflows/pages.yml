name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required pages
        run: |
          test -f site/index.html
          test -f site/privacy/index.html
          test -f site/support/index.html
          grep -Fq "koovanky@gmail.com" site/privacy/index.html
          grep -Fq "koovanky@gmail.com" site/support/index.html
          if grep -R -E "example\\.com|http://" site; then
            echo "Placeholder or insecure URL found"
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
